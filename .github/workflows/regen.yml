name: regen-registry

# Defensive job: every push to main triggers a fresh regenerate + sign
# of registry.json. The signing key only exists in repository secrets —
# contributors can't sign in their PRs, so this workflow re-signs after
# every merge and pushes the result directly back to main if either
# registry.json or registry.json.sig drifted from what's on disk.
#
# Claudette refuses any registry whose signature doesn't verify against
# the embedded public key, so keeping this workflow green is a hard
# requirement for community contributions to be installable. See
# `.github/workflows/health.yml` for the independent drift detector.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize back-to-back regen runs so a fast double-merge doesn't race
# two pushes against main (the second would fail with non-fast-forward).
concurrency:
  group: regen-registry
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    # Skip on the bot's own self-push. Belt-and-suspenders with the
    # [skip ci] marker in the commit message — covers the case where a
    # human or another workflow forwards the bot's commit without the
    # marker.
    if: github.event.head_commit.author.email != 'claudette-community-bot@users.noreply.github.com'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - run: bun install --frozen-lockfile
      - run: bun run generate

      - name: Sign registry.json
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.COMMUNITY_REGISTRY_MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::COMMUNITY_REGISTRY_MINISIGN_SECRET_KEY is not set."
            echo "::error::Add the secret in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Write the secret key to a tempfile (minisign reads from a file path,
          # not stdin or env). Trap-cleanup so the file goes away on any exit.
          KEYFILE=$(mktemp)
          trap 'shred -u "$KEYFILE" 2>/dev/null || rm -f "$KEYFILE"' EXIT
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$KEYFILE"
          SOURCE_SHA=$(jq -r .source.sha registry.json)
          TS=$(date -u +%FT%TZ)
          # -W: secret key has no password (passwordless format). Must match
          # the format used when the key was generated.
          minisign -S -s "$KEYFILE" \
            -m registry.json \
            -x registry.json.sig \
            -t "claudette-community registry signed at ${TS} for source.sha=${SOURCE_SHA}"
          echo "Signed registry.json (source.sha=${SOURCE_SHA})"

      - name: Verify signature locally before pushing
        run: |
          set -euo pipefail
          minisign -V -p keys/community-registry.pub -m registry.json -x registry.json.sig
          echo "Local verify OK — signature matches keys/community-registry.pub"

      - name: Commit and push if drift
        run: |
          set -euo pipefail
          # Only registry.json and registry.json.sig are mechanical
          # outputs of this workflow. If anything else changed, that's a
          # bug — refuse to push it.
          unexpected=$(git status --porcelain | awk '$2 != "registry.json" && $2 != "registry.json.sig" {print}')
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected files modified by regen workflow:"
            echo "$unexpected"
            exit 1
          fi
          if git diff --quiet -- registry.json registry.json.sig; then
            echo "No drift — nothing to push."
            exit 0
          fi
          git config user.name  "claudette-community-bot"
          git config user.email "claudette-community-bot@users.noreply.github.com"
          git add registry.json registry.json.sig
          # [skip ci] prevents this commit from re-triggering regen
          # (and validate); the if: guard at the job level is a second
          # line of defence against loops.
          git commit -m "chore(registry): regenerate and sign registry.json [skip ci]"
          git push origin HEAD:main
